<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ask Clonemac about FundEQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#1030A0; --ink:#0E1428; --cyan:#00A9C2; --cyan-d:#0089A0; --slate:#46546f; --slate-l:#8a93a8; --line:#e6e9f2; --line-2:#eaeef6; --warn:#C2871A; --warnbg:#fbf3e2; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Inter',system-ui,sans-serif; background:#eef1f8; color:var(--ink); -webkit-font-smoothing:antialiased; }
  .disp{ font-family:'Spectral',Georgia,serif; }
  .mono{ font-family:'IBM Plex Mono',monospace; letter-spacing:.12em; text-transform:uppercase; }
  .wrap{ width:100%; max-width:780px; min-height:100vh; margin:0 auto; background:#fff; display:flex; flex-direction:column; box-shadow:0 0 60px rgba(16,48,160,.06); }
  header{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; z-index:5; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .brand .t1{ font-size:19px; font-weight:600; line-height:1; }
  .brand .t1 b{ color:var(--navy); font-weight:600; }
  .brand .t2{ font-size:8.5px; color:var(--slate-l); margin-top:4px; }
  .navbtn{ cursor:pointer; border:1px solid #e0e4ef; background:#fff; color:var(--slate); border-radius:7px; padding:7px 12px; font:600 11.5px Inter,sans-serif; display:flex; align-items:center; gap:7px; }
  .navbtn.on{ background:var(--navy); color:#fff; }
  .badge{ background:var(--warn); color:#fff; border-radius:20px; font-size:10px; padding:1px 7px; font-weight:700; }
  main{ flex:1; overflow-y:auto; padding:26px 22px; }
  .empty{ max-width:520px; margin:6vh auto 0; text-align:center; }
  .empty h1{ font-size:25px; font-weight:600; margin-top:16px; line-height:1.2; }
  .empty p{ font-size:13.5px; color:var(--slate); line-height:1.6; margin-top:12px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:22px; }
  .chip{ cursor:pointer; border:1px solid #e0e4ef; background:#fff; color:var(--slate); border-radius:20px; padding:8px 14px; font-size:12.5px; transition:all .15s; }
  .chip:hover{ border-color:var(--cyan); color:var(--ink); }
  .followups{ display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; margin-left:2px; }
  .fchip{ cursor:pointer; border:1px solid #e0e4ef; background:#fff; color:var(--slate); border-radius:20px; padding:6px 12px; font:500 11.5px Inter,sans-serif; transition:all .15s; }
  .fchip:hover{ border-color:var(--cyan); color:var(--ink); }
  .row{ margin-bottom:18px; }
  .row.u{ display:flex; justify-content:flex-end; }
  .bub-u{ max-width:78%; background:var(--navy); color:#fff; padding:11px 15px; border-radius:14px 14px 4px 14px; font-size:13.5px; line-height:1.55; }
  .bub-a{ max-width:82%; background:#f7f9fc; border:1px solid var(--line-2); padding:13px 16px; border-radius:14px 14px 14px 4px; font-size:13.5px; line-height:1.6; color:#1d2740; white-space:pre-wrap; }
  .tag{ font-family:'IBM Plex Mono',monospace; font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; display:inline-block; padding:3px 9px; border-radius:5px; margin-top:8px; margin-left:2px; }
  .tag.know{ color:var(--cyan-d); background:#e7f6f9; }
  .tag.flag{ color:var(--warn); background:var(--warnbg); }
  .tag.err{ color:#9aa3b5; background:#f1f3f8; }
  .dots{ display:flex; gap:5px; align-items:center; padding:4px 2px; }
  .dots span{ width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:b 1s infinite; }
  .dots span:nth-child(2){ animation-delay:.15s; } .dots span:nth-child(3){ animation-delay:.3s; }
  @keyframes b{ 0%,100%{ opacity:.25; transform:translateY(0);} 50%{ opacity:.9; transform:translateY(-3px);} }
  footer{ border-top:1px solid var(--line); padding:14px 18px 18px; background:#fff; }
  .composer{ display:flex; gap:9px; align-items:flex-end; max-width:720px; margin:0 auto; }
  textarea{ flex:1; resize:none; border:1px solid #d8deeb; border-radius:11px; padding:12px 14px; font:13.5px Inter,sans-serif; color:#1d2740; max-height:140px; line-height:1.5; }
  textarea:focus{ outline:2px solid var(--cyan); outline-offset:1px; }
  .send{ cursor:pointer; background:var(--navy); color:#fff; border:none; border-radius:11px; padding:12px 18px; font:600 13.5px Inter,sans-serif; }
  .send:disabled{ opacity:.45; cursor:default; }
  .disc{ font-family:'IBM Plex Mono',monospace; font-size:8px; color:#aab2c4; text-align:center; margin-top:9px; letter-spacing:.1em; }
  /* review */
  .rvtop{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px; }
  .rvtop h2{ font-size:22px; font-weight:600; }
  .btn-o{ cursor:pointer; border:1px solid var(--navy); background:#fff; color:var(--navy); border-radius:7px; padding:7px 12px; font:600 11.5px Inter,sans-serif; text-decoration:none; display:inline-block; }
  .filters{ display:flex; gap:6px; margin-top:16px; }
  .fbtn{ cursor:pointer; border:1px solid #e0e4ef; background:#fff; color:var(--slate-l); border-radius:20px; padding:5px 13px; font:600 11.5px Inter,sans-serif; }
  .fbtn.on{ border-color:var(--navy); background:#eef2fd; color:var(--navy); }
  .entry{ border:1px solid var(--line-2); border-radius:11px; padding:14px 15px; background:#fff; margin-top:12px; }
  .entry .top{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .entry .q{ font-size:13.5px; font-weight:600; margin-top:10px; line-height:1.45; }
  .entry .a{ font-size:13px; color:var(--slate); margin-top:6px; line-height:1.55; white-space:pre-wrap; }
  .entry .when{ font-family:'IBM Plex Mono',monospace; font-size:8px; color:#aab2c4; }
  .rate{ display:flex; gap:7px; margin-top:12px; }
  .rbtn{ cursor:pointer; border:1px solid #e0e4ef; background:#fff; color:var(--slate-l); border-radius:7px; padding:5px 12px; font:600 11.5px Inter,sans-serif; }
  .rbtn.good.on{ border-color:var(--cyan-d); background:#e7f6f9; color:var(--cyan-d); }
  .rbtn.needs.on{ border-color:var(--warn); background:var(--warnbg); color:var(--warn); }
  .note{ width:100%; margin-top:10px; resize:vertical; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font:12.5px Inter,sans-serif; color:#1d2740; line-height:1.5; background:#fafbfe; }
  .note:focus{ outline:2px solid var(--cyan); outline-offset:1px; }
  .blank{ margin-top:26px; padding:30px 20px; border:1px dashed #d8deeb; border-radius:12px; text-align:center; color:var(--slate-l); font-size:13px; }

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo-img logo-hd" role="img" aria-label="Clonemac"></div>
      <div><div class="t1 disp">Ask <b>Clonemac</b></div><div class="t2 mono">FundEQ · internal knowledge</div></div>
    </div>
    <button class="navbtn" id="navBtn" onclick="toggle()">Review log</button>
  </header>

  <main id="main"></main>

  <footer id="composer">
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Ask Clonemac…"></textarea>
      <button class="send" id="sendBtn" onclick="send()">Ask</button>
    </div>
    <div class="disc">Answers from Clonemac's knowledge · not formal compliance, legal or investment advice</div>
  </footer>
</div>

<script>
let examples = [];          // [{label, query}] built at runtime from *.md files in the knowledge folder
let examplesLoaded = false;
let messages = [];
let view = "chat";
let loading = false;
let filter = "all";
let logCache = [];

const $ = (id) => document.getElementById(id);
const esc = (s) => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function tagFor(cat){
  if(cat==="no_go")   return ['flag','Routed to a person'];
  if(cat==="out_of_scope") return ['flag','Flagged for Clonemac'];
  if(cat==="error")   return ['err','Service error'];
  return ['know',"From Clonemac's knowledge"];
}

const FOLLOWUPS = ["I don't agree with Clonemac", "Clonemac's information is out of date"];
function followupHTML(){
  let h = '<div class="followups">';
  FOLLOWUPS.forEach(t => { h += '<button class="fchip" onclick="send('+JSON.stringify(t).replace(/"/g,'&quot;')+')">'+esc(t)+'</button>'; });
  return h + '</div>';
}

function toggle(){ view = view==="chat" ? "review" : "chat"; render(); if(view==="review") loadLog(); }

async function send(textArg){
  const q = (textArg ?? $("input").value).trim();
  if(!q || loading) return;
  $("input").value = "";
  messages.push({role:"user", content:q});
  loading = true; render();
  try{
    const res = await fetch("/ask", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ messages: messages.map(m=>({role:m.role, content:m.content})) })
    });
    const data = await res.json();
    messages.push({ role:"assistant", content:data.answer || "(no answer)", category:data.category || "answer" });
  }catch(e){
    messages.push({ role:"assistant", content:"Couldn't reach the knowledge service. Try again in a moment.", category:"error" });
  }finally{
    loading = false; render();
  }
}

async function loadLog(){
  const m = $("main");
  m.innerHTML = '<div class="blank">Loading…</div>';
  try{
    const res = await fetch("/api/log?filter=all&limit=500");
    if(res.status === 403){ logCache = null; render(); return; }
    logCache = await res.json();
  }catch(e){ logCache = []; }
  render();
}

async function rate(id, val){
  const e = logCache.find(x=>x.id===id); if(!e) return;
  e.rating = e.rating===val ? null : val;
  render();
  fetch("/api/log/"+encodeURIComponent(id), { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ rating: e.rating || "" }) }).catch(()=>{});
}
let noteTimer;
function noteChange(id, val){
  const e = logCache.find(x=>x.id===id); if(e) e.note = val;
  clearTimeout(noteTimer);
  noteTimer = setTimeout(()=>{
    fetch("/api/log/"+encodeURIComponent(id), { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ note: val }) }).catch(()=>{});
  }, 600);
}

function render(){
  $("navBtn").className = "navbtn" + (view==="review" ? " on" : "");
  $("navBtn").innerHTML = view==="chat" ? "Review log" : "Back to chat";
  $("composer").style.display = view==="chat" ? "block" : "none";
  const m = $("main");

  if(view==="chat"){
    let h = "";
    if(messages.length===0){
      h += '<div class="empty"><div class="logo-img logo-hero" role="img" aria-label="Clonemac"></div>';
      h += '<h1 class="disp">Clonemac uses Cormac\'s brain when he is not using it. Clonemac is available 24/7.</h1><p>The fund, the structure, the RE transition, the Investment Manager arrangement, a process or a counterparty. If it\'s a compliance or legal call, it\'ll point you to the right person rather than guess.</p>';
      if(examples.length){
        h += '<div class="chips">';
        examples.forEach(e => h += '<button class="chip" onclick="send('+JSON.stringify(e.query).replace(/"/g,'&quot;')+')">'+esc(e.label)+'</button>');
        h += '</div>';
      } else if(!examplesLoaded){
        h += '<div class="chips"><span class="chip" style="cursor:default;opacity:.55">Loading topics…</span></div>';
      }
      h += '</div>';
    }
    messages.forEach(msg => {
      if(msg.role==="user"){ h += '<div class="row u"><div class="bub-u">'+esc(msg.content)+'</div></div>'; }
      else{ const [cls,label] = tagFor(msg.category); h += '<div class="row"><div class="bub-a">'+esc(msg.content)+'</div><div class="tag '+cls+'">'+label+'</div>'+(msg.category==="error"?"":followupHTML())+'</div>'; }
    });
    if(loading) h += '<div class="dots"><span></span><span></span><span></span></div>';
    m.innerHTML = h;
    m.scrollTop = m.scrollHeight;
    return;
  }

  // review
  if(logCache === null){ m.innerHTML = '<div class="rvtop"><h2 class="disp">Review log</h2></div><div class="blank">This view is for admins only. The account you\'re signed in with isn\'t on the review list.</div>'; return; }
  let h = '<div class="rvtop"><div><div class="mono" style="font-size:9px;color:#8a93a8">Review &amp; refine</div><h2 class="disp">Every question &amp; answer</h2></div>';
  if(logCache.length) h += '<div style="display:flex;gap:7px"><a class="btn-o" href="/api/log/export">Export (JSON)</a></div>';
  h += '</div><p style="font-size:12.5px;color:#46546f;line-height:1.6;max-width:600px;margin-top:8px">Mark each answer <b>Good</b> or <b>Needs work</b>, and add a correction where it\'s wrong or thin — that\'s the signal you fold into the knowledge base.</p>';

  if(logCache.length){
    const counts = { all:logCache.length, flagged:logCache.filter(e=>e.flag).length, rated:logCache.filter(e=>e.rating).length };
    h += '<div class="filters">';
    [["all","All "+counts.all],["flagged","Flagged "+counts.flagged],["rated","Reviewed "+counts.rated]].forEach(([k,lbl])=>{
      h += '<button class="fbtn'+(filter===k?' on':'')+'" onclick="filter=\''+k+'\';render()">'+lbl+'</button>';
    });
    h += '</div>';
  }

  const shown = (logCache||[]).filter(e => filter==="flagged" ? e.flag : filter==="rated" ? e.rating : true);
  if(!logCache.length){ h += '<div class="blank">No questions yet. Ask a few in the chat and they\'ll appear here.</div>'; }
  else{
    shown.forEach(e => {
      const [cls,label] = tagFor(e.category);
      h += '<div class="entry"><div class="top"><span class="tag '+cls+'">'+label+'</span><span class="when">'+(e.user?esc(e.user)+' · ':'')+new Date(e.at).toLocaleString()+'</span></div>';
      h += '<div class="q">'+esc(e.q)+'</div><div class="a">'+esc(e.a)+'</div>';
      h += '<div class="rate"><button class="rbtn good'+(e.rating==="good"?' on':'')+'" onclick="rate(\''+e.id+'\',\'good\')">Good</button><button class="rbtn needs'+(e.rating==="needs"?' on':'')+'" onclick="rate(\''+e.id+'\',\'needs\')">Needs work</button></div>';
      h += '<textarea class="note" placeholder="Clonemac\'s correction or note" oninput="noteChange(\''+e.id+'\',this.value)">'+esc(e.note)+'</textarea></div>';
    });
  }
  m.innerHTML = h;
}

async function loadExamples(){
  try{
    const res = await fetch("/api/files");
    if(res.ok){
      const data = await res.json();
      const list = Array.isArray(data) ? data : (data.files || data.items || []);
      const names = list
        .map(f => typeof f === "string" ? f : (f && (f.name || f.filename || f.title)) || "")
        .filter(n => /\.md$/i.test(n));
      examples = names.map(n => {
        const topic = n.replace(/\.md$/i, "").replace(/[._-]+/g, " ").trim();
        const q = "I want to know more about " + topic;
        return { label: q, query: q };
      });
    }
  }catch(e){ /* no suggestions if the knowledge folder can't be reached */ }
  examplesLoaded = true;
  if(view==="chat" && messages.length===0) render();
}

$("input").addEventListener("keydown", (e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }});
render();
loadExamples();
</script>
</body>
</html>
